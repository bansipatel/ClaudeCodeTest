<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect 4</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --p1-primary: #e0368a;
      --p1-light:   #f9a8d4;
      --p2-primary: #2563eb;
      --p2-light:   #93c5fd;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fce4f3 0%, #dce9ff 100%);
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 24px;
      background: linear-gradient(90deg, #e05aaa, #5a8de0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ---- LOBBY ---- */
    #screen-lobby { display: flex; flex-direction: column; align-items: center; gap: 14px; }

    .lobby-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.6);
      border-radius: 18px;
      padding: 20px 28px;
      box-shadow: 0 4px 20px rgba(140,80,180,0.10);
      width: 300px;
    }

    .lobby-group h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #aaa;
      margin-bottom: 4px;
    }

    .lobby-divider {
      font-size: 0.8rem;
      color: #bbb;
      margin: 2px 0;
    }

    /* ---- COLOR PICKER ---- */
    .color-picker-section {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .color-picker-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .color-picker-col-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #aaa;
      font-weight: 600;
    }

    .color-swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: center;
      width: 113px; /* 4 × 22px + 3 × 5px gaps */
    }

    .swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.5);
      transition: transform 0.12s, box-shadow 0.12s;
    }

    .swatch:hover:not(.taken) { transform: scale(1.25); }

    .swatch.selected {
      border-color: #fff;
      box-shadow: 0 0 0 2px #7c3aed, 0 2px 8px rgba(0,0,0,0.25);
      transform: scale(1.15);
    }

    .swatch.taken {
      opacity: 0.2;
      cursor: not-allowed;
    }

    .color-conflict {
      font-size: 0.78rem;
      color: #dc2626;
      text-align: center;
      display: none;
    }

    /* ---- WAITING ---- */
    #screen-waiting { display: none; flex-direction: column; align-items: center; gap: 18px; text-align: center; }

    .room-code-box {
      background: #fff;
      border-radius: 16px;
      padding: 18px 36px;
      box-shadow: 0 4px 20px rgba(140,80,180,0.12);
    }

    .room-code-box .label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
    .room-code-box .code  { font-size: 2.8rem; font-weight: 900; letter-spacing: 8px; color: #7c3aed; }

    .waiting-msg { color: #888; font-size: 0.95rem; }
    .waiting-dots::after {
      content: '';
      animation: dots 1.4s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }

    /* ---- GAME ---- */
    #screen-game { display: none; flex-direction: column; align-items: center; }

    #scoreboard {
      display: flex;
      gap: 32px;
      margin-bottom: 18px;
    }

    .score-card {
      text-align: center;
      padding: 10px 24px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 1rem;
      color: #fff;
      min-width: 90px;
    }

    .score-card.p1 { background: linear-gradient(135deg, var(--p1-light), var(--p1-primary)); }
    .score-card.p2 { background: linear-gradient(135deg, var(--p2-light), var(--p2-primary)); }
    .score-card .name { font-size: 0.75rem; letter-spacing: 1px; text-transform: uppercase; opacity: 0.85; }
    .score-card .pts  { font-size: 1.8rem; line-height: 1.1; }

    #player-badge {
      font-size: 0.82rem;
      font-weight: 600;
      color: #888;
      margin-bottom: 10px;
      height: 18px;
    }

    #status {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 14px;
      height: 28px;
      color: #555;
    }

    #status.p1-turn { color: var(--p1-primary); }
    #status.p2-turn { color: var(--p2-primary); }
    #status.win      { color: #333; font-size: 1.3rem; }

    #indicator-row {
      display: grid;
      grid-template-columns: repeat(7, 64px);
      gap: 6px;
      margin-bottom: 4px;
      height: 26px;
    }

    .indicator-cell { display: flex; align-items: center; justify-content: center; }
    .indicator-cell .drop-dot {
      width: 16px; height: 16px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .indicator-cell.hovered .drop-dot { opacity: 0.7; }

    #board-wrap {
      background: linear-gradient(160deg, #c7d7ff, #f7c8ee);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 32px rgba(120,80,180,0.18), 0 2px 8px rgba(0,0,0,0.08);
    }

    #board {
      display: grid;
      grid-template-columns: repeat(7, 64px);
      grid-template-rows: repeat(6, 64px);
      gap: 6px;
    }

    .cell {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.55);
      cursor: pointer;
      transition: background 0.18s, transform 0.15s, box-shadow 0.15s;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.10);
    }

    .cell:hover { transform: scale(1.05); }

    .cell.p1 {
      background: radial-gradient(circle at 35% 35%, var(--p1-light), var(--p1-primary));
      box-shadow: 0 3px 12px rgba(0,0,0,0.25), inset 0 1px 3px rgba(255,255,255,0.3);
      cursor: default;
    }

    .cell.p2 {
      background: radial-gradient(circle at 35% 35%, var(--p2-light), var(--p2-primary));
      box-shadow: 0 3px 12px rgba(0,0,0,0.25), inset 0 1px 3px rgba(255,255,255,0.3);
      cursor: default;
    }

    .cell.not-my-turn { cursor: not-allowed; }

    .cell.win-cell { animation: pulse 0.7s ease-in-out infinite alternate; }

    @keyframes pulse {
      from { transform: scale(1);    filter: brightness(1); }
      to   { transform: scale(1.12); filter: brightness(1.2); }
    }

    .cell.drop { animation: dropIn 0.28s cubic-bezier(0.23, 1, 0.32, 1); }
    @keyframes dropIn {
      from { transform: translateY(-320px); }
      to   { transform: translateY(0); }
    }

    #controls {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      padding: 10px 28px;
      border: none;
      border-radius: 30px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
    }

    button:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.15); }
    button:active { transform: translateY(0); }

    .btn-primary { background: linear-gradient(90deg, #f472b6, #60a5fa); color: #fff; }
    .btn-secondary { background: #fff; color: #555; border: 2px solid #c4b5fd; }
    .btn-danger { background: #fee2e2; color: #b91c1c; border: 2px solid #fca5a5; }

    input[type="text"] {
      padding: 10px 16px;
      border-radius: 30px;
      border: 2px solid #c4b5fd;
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: 4px;
      text-transform: uppercase;
      width: 160px;
      outline: none;
      color: #7c3aed;
    }

    input[type="text"]:focus { border-color: #7c3aed; }

    #room-info {
      font-size: 0.78rem;
      color: #aaa;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    /* ---- CONFIG WARNING ---- */
    #config-warning {
      background: #fff3cd;
      border: 2px solid #ffc107;
      border-radius: 12px;
      padding: 14px 20px;
      max-width: 360px;
      text-align: center;
      font-size: 0.88rem;
      color: #856404;
      line-height: 1.5;
    }

    #config-warning strong { display: block; font-size: 1rem; margin-bottom: 4px; }
    #config-warning a { color: #7c3aed; }
  </style>
</head>
<body>

<!-- ==================== LOBBY ==================== -->
<div id="screen-lobby">
  <h1>Connect 4</h1>

  <div id="config-warning" style="display:none">
    <strong>Firebase not configured</strong>
    Online play requires setup. See the instructions below or play locally.
  </div>

  <!-- Color picker -->
  <div class="lobby-group">
    <h3>Player Colors</h3>
    <div class="color-picker-section">
      <div class="color-picker-col">
        <div class="color-picker-col-label">Player 1</div>
        <div class="color-swatches" id="swatches-p1"></div>
      </div>
      <div class="color-picker-col">
        <div class="color-picker-col-label">Player 2</div>
        <div class="color-swatches" id="swatches-p2"></div>
      </div>
    </div>
  </div>

  <div class="lobby-group">
    <h3>Play Online</h3>
    <button class="btn-primary" onclick="createGame()" style="width:100%">Create Game</button>
    <div class="lobby-divider">or join one</div>
    <div style="display:flex;gap:8px;width:100%">
      <input type="text" id="join-code" placeholder="CODE" maxlength="6">
      <button class="btn-primary" onclick="joinGame()" style="padding:10px 18px">Join</button>
    </div>
    <div class="color-conflict" id="color-conflict"></div>
  </div>

  <div class="lobby-group">
    <h3>Play Locally</h3>
    <button class="btn-secondary" onclick="startLocal()" style="width:100%">2 Players (same screen)</button>
    <button class="btn-secondary" onclick="startCPU()" style="width:100%">vs CPU</button>
  </div>
</div>

<!-- ==================== WAITING ==================== -->
<div id="screen-waiting">
  <h1>Connect 4</h1>
  <div class="room-code-box">
    <div class="label">Share this code</div>
    <div class="code" id="display-code"></div>
  </div>
  <p class="waiting-msg">Waiting for opponent<span class="waiting-dots"></span></p>
  <button class="btn-danger" onclick="cancelOnline()">Cancel</button>
</div>

<!-- ==================== GAME ==================== -->
<div id="screen-game">
  <h1>Connect 4</h1>

  <div id="scoreboard">
    <div class="score-card p1">
      <div class="name" id="score-name-p1">Player 1</div>
      <div class="pts" id="score-p1">0</div>
    </div>
    <div class="score-card p2">
      <div class="name" id="score-name-p2">Player 2</div>
      <div class="pts" id="score-p2">0</div>
    </div>
  </div>

  <div id="player-badge"></div>
  <div id="status"></div>

  <div id="indicator-row"></div>
  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <div id="controls">
    <button class="btn-primary" id="btn-reset" onclick="handleReset()">New Game</button>
    <button class="btn-secondary" onclick="goLobby()">Lobby</button>
  </div>
  <div id="room-info"></div>
</div>

<!-- Firebase SDK (loaded only when needed) -->
<script>
// ============================================================
//  FIREBASE CONFIG
//  Replace these placeholder values with your own from:
//  console.firebase.google.com → Project Settings → Your apps
// ============================================================
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBpt9q9tBHNrkLDS6Iw5v95iTw2FEFr64Y",
  authDomain:        "connect-4-44428.firebaseapp.com",
  databaseURL:       "https://connect-4-44428-default-rtdb.firebaseio.com",
  projectId:         "connect-4-44428",
  storageBucket:     "connect-4-44428.firebasestorage.app",
  messagingSenderId: "529591041878",
  appId:             "1:529591041878:web:3bd5a5e3c1f253156e60f7"
};
// ============================================================

const COLOR_DEFS = {
  pink:   { label: 'Pink',   primary: '#e0368a', light: '#f9a8d4' },
  orange: { label: 'Orange', primary: '#ea6c1a', light: '#fdba74' },
  yellow: { label: 'Yellow', primary: '#ca8a04', light: '#fde047' },
  blue:   { label: 'Blue',   primary: '#2563eb', light: '#93c5fd' },
  green:  { label: 'Green',  primary: '#16a34a', light: '#86efac' },
  purple: { label: 'Purple', primary: '#7c3aed', light: '#c4b5fd' },
  black:  { label: 'Black',  primary: '#374151', light: '#9ca3af' },
  red:    { label: 'Red',    primary: '#dc2626', light: '#fca5a5' },
};

const ROWS = 6, COLS = 7;

// Game state
let board, current, gameOver, mode; // mode: 'online' | 'local' | 'cpu'
let scores = { 1: 0, 2: 0 };
let myPlayer = null;   // 1 or 2 (online only)
let roomCode  = null;
let roomRef   = null;
let unsubscribe = null;
let playerColors = { 1: 'pink', 2: 'blue' };

// ---- Firebase ----
let db = null;

function isFirebaseConfigured() {
  return FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.apiKey !== 'YOUR_API_KEY';
}

function loadFirebase(callback) {
  if (db) { callback(); return; }
  if (!isFirebaseConfigured()) {
    alert('Firebase is not configured yet. See the setup instructions in connect4.html.');
    return;
  }
  const scripts = [
    'https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js',
    'https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js'
  ];
  let loaded = 0;
  scripts.forEach(src => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = () => { if (++loaded === scripts.length) initFirebase(callback); };
    document.head.appendChild(s);
  });
}

function initFirebase(callback) {
  if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
  callback();
}

// ---- Color helpers ----
function applyColors() {
  const p1 = COLOR_DEFS[playerColors[1]];
  const p2 = COLOR_DEFS[playerColors[2]];
  const root = document.documentElement;
  root.style.setProperty('--p1-primary', p1.primary);
  root.style.setProperty('--p1-light',   p1.light);
  root.style.setProperty('--p2-primary', p2.primary);
  root.style.setProperty('--p2-light',   p2.light);
  const n1 = document.getElementById('score-name-p1');
  const n2 = document.getElementById('score-name-p2');
  if (n1) n1.textContent = p1.label;
  if (n2) n2.textContent = p2.label;
}

function renderSwatches() {
  [1, 2].forEach(player => {
    const other = player === 1 ? 2 : 1;
    const container = document.getElementById('swatches-p' + player);
    if (!container) return;
    container.innerHTML = '';
    Object.entries(COLOR_DEFS).forEach(([key, def]) => {
      const sw = document.createElement('div');
      sw.className = 'swatch';
      sw.style.background = def.primary;
      sw.title = def.label;
      if (playerColors[player] === key) sw.classList.add('selected');
      if (playerColors[other] === key) {
        sw.classList.add('taken');
      } else {
        sw.addEventListener('click', () => {
          playerColors[player] = key;
          applyColors();
          renderSwatches();
        });
      }
      container.appendChild(sw);
    });
  });
}

// ---- Room helpers ----
function generateCode() {
  return Math.random().toString(36).substring(2, 8).toUpperCase();
}

function flatBoard(b) { return b.flat(); }
function expandBoard(flat) {
  const arr = Array.isArray(flat) ? flat : Object.values(flat);
  const b = [];
  for (let r = 0; r < ROWS; r++) b.push(arr.slice(r * COLS, (r + 1) * COLS).map(Number));
  return b;
}

// ---- Screens ----
function showScreen(id) {
  ['screen-lobby','screen-waiting','screen-game'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'flex' : 'none';
  });
}

function goLobby() {
  detachListener();
  if (roomRef) { roomRef.off(); roomRef = null; }
  roomCode = null; myPlayer = null; mode = null;
  showScreen('screen-lobby');
}

function cancelOnline() {
  if (roomRef) { roomRef.remove(); roomRef = null; }
  goLobby();
}

// ---- Online: Create ----
function createGame() {
  if (!isFirebaseConfigured()) {
    document.getElementById('config-warning').style.display = 'block';
    return;
  }
  loadFirebase(() => {
    const code = generateCode();
    roomCode = code;
    myPlayer = 1;

    roomRef = db.ref('rooms/' + code);
    roomRef.set({
      board: flatBoard(Array.from({length: ROWS}, () => Array(COLS).fill(0))),
      current: 1,
      gameOver: false,
      winner: 0,
      winCells: [],
      scores: {p1: 0, p2: 0},
      players: {p1: true, p2: false},
      resetRequest: 0,
      colors: { p1: playerColors[1] }
    });

    // Auto-delete room after 2 hours
    roomRef.onDisconnect().remove();

    document.getElementById('display-code').textContent = code;
    showScreen('screen-waiting');

    // Wait for opponent
    roomRef.child('players/p2').on('value', snap => {
      if (snap.val() === true) {
        roomRef.child('players/p2').off();
        startOnlineGame();
      }
    });
  });
}

// ---- Online: Join ----
function joinGame() {
  if (!isFirebaseConfigured()) {
    document.getElementById('config-warning').style.display = 'block';
    return;
  }
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (code.length < 4) { alert('Enter a valid room code.'); return; }

  loadFirebase(() => {
    const ref = db.ref('rooms/' + code);
    ref.once('value', snap => {
      if (!snap.exists()) {
        alert('Room not found. Check the code and try again.');
        return;
      }
      const data = snap.val();
      if (data.players && data.players.p2) {
        alert('Room is full.');
        return;
      }

      // Check color conflict with Player 1
      const p1Color = data.colors && data.colors.p1 ? data.colors.p1 : 'pink';
      const conflictEl = document.getElementById('color-conflict');
      if (playerColors[2] === p1Color) {
        conflictEl.textContent = `Player 1 chose ${COLOR_DEFS[p1Color].label} — pick a different color for Player 2.`;
        conflictEl.style.display = 'block';
        // Force-update the swatch display to show P1's taken color
        playerColors[1] = p1Color;
        renderSwatches();
        return;
      }
      conflictEl.style.display = 'none';

      // Sync P1's color locally, then join
      playerColors[1] = p1Color;
      applyColors();
      renderSwatches();

      roomCode = code;
      myPlayer = 2;
      roomRef = ref;
      roomRef.update({ 'colors/p2': playerColors[2] });
      roomRef.child('players/p2').set(true);
      roomRef.child('players/p2').onDisconnect().set(false);
      startOnlineGame();
    });
  });
}

// ---- Start online game ----
function startOnlineGame() {
  mode = 'online';
  scores = { 1: 0, 2: 0 };
  showScreen('screen-game');
  document.getElementById('room-info').textContent = 'Room: ' + roomCode;
  document.getElementById('btn-reset').style.display = myPlayer === 1 ? '' : 'none';

  listenToRoom();
}

function listenToRoom() {
  detachListener();
  const handler = roomRef.on('value', snap => {
    if (!snap.exists()) { goLobby(); return; }
    const data = snap.val();

    // Apply colors from Firebase
    if (data.colors) {
      if (data.colors.p1) playerColors[1] = data.colors.p1;
      if (data.colors.p2) playerColors[2] = data.colors.p2;
      applyColors();
    }

    board   = expandBoard(data.board);
    current = data.current;
    gameOver = data.gameOver;
    scores  = { 1: data.scores.p1, 2: data.scores.p2 };

    const winCellsRaw = data.winCells
      ? (Array.isArray(data.winCells) ? data.winCells : Object.values(data.winCells))
      : [];
    const winCells = winCellsRaw.length
      ? winCellsRaw.map(c => Array.isArray(c) ? c : Object.values(c))
      : null;

    renderGame(gameOver && winCells && winCells.length ? winCells : null);
  });
  unsubscribe = () => roomRef.off('value', handler);
}

function detachListener() {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
}

// ---- Local modes ----
function startLocal() {
  mode = 'local'; myPlayer = null; roomCode = null;
  scores = { 1: 0, 2: 0 };
  resetBoard();
  showScreen('screen-game');
  document.getElementById('room-info').textContent = 'Local 2 Player';
  document.getElementById('btn-reset').style.display = '';
}

function startCPU() {
  mode = 'cpu'; myPlayer = 1; roomCode = null;
  scores = { 1: 0, 2: 0 };
  resetBoard();
  showScreen('screen-game');
  document.getElementById('room-info').textContent = 'vs CPU';
  document.getElementById('btn-reset').style.display = '';
}

// ---- Game logic ----
function resetBoard() {
  board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  current = 1;
  gameOver = false;
  renderGame();
}

function handleReset() {
  if (mode === 'online') {
    if (myPlayer !== 1) return;
    roomRef.update({
      board: flatBoard(Array.from({length: ROWS}, () => Array(COLS).fill(0))),
      current: 1,
      gameOver: false,
      winner: 0,
      winCells: [],
      scores: { p1: scores[1], p2: scores[2] }
    });
  } else {
    resetBoard();
  }
}

function dropPiece(col) {
  if (gameOver) return;

  if (mode === 'online') {
    if (current !== myPlayer) return; // not your turn
    const row = lowestEmpty(col);
    if (row === -1) return;
    commitMove(row, col, current);
    return;
  }

  if (mode === 'cpu' && current === 2) return;

  const row = lowestEmpty(col);
  if (row === -1) return;
  placeLocal(row, col, current);
}

function commitMove(row, col, player) {
  // Write move to Firebase
  const newBoard = board.map(r => [...r]);
  newBoard[row][col] = player;

  const win = checkWin(newBoard, row, col, player);
  const flatB = flatBoard(newBoard);

  const next = player === 1 ? 2 : 1;
  const tied = !win && newBoard[0].every((_, c) => lowestEmptyIn(newBoard, c) === -1);

  const update = {
    board: flatB,
    current: next,
    gameOver: !!(win || tied),
    winner: win ? player : 0,
    winCells: win ? win.cells : [],
    scores: {
      p1: scores[1] + (win && player === 1 ? 1 : 0),
      p2: scores[2] + (win && player === 2 ? 1 : 0)
    }
  };
  roomRef.update(update);
}

function placeLocal(row, col, player) {
  board[row][col] = player;
  const win = checkWin(board, row, col, player);
  const tied = !win && board[0].every((_, c) => lowestEmpty(c) === -1);

  if (win) { scores[player]++; gameOver = true; renderGame(win.cells); return; }
  if (tied) { gameOver = true; renderGame(); return; }

  current = player === 1 ? 2 : 1;
  renderGame();

  if (mode === 'cpu' && current === 2 && !gameOver) {
    setTimeout(cpuMove, 420);
  }
}

function lowestEmpty(col) { return lowestEmptyIn(board, col); }
function lowestEmptyIn(b, col) {
  for (let r = ROWS - 1; r >= 0; r--) if (b[r][col] === 0) return r;
  return -1;
}

// ---- Win detection ----
function checkWin(b, row, col, player) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    const cells = [[row, col]];
    for (let d = 1; d < 4; d++) {
      const nr = row + dr*d, nc = col + dc*d;
      if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS || b[nr][nc] !== player) break;
      cells.push([nr, nc]);
    }
    for (let d = 1; d < 4; d++) {
      const nr = row - dr*d, nc = col - dc*d;
      if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS || b[nr][nc] !== player) break;
      cells.push([nr, nc]);
    }
    if (cells.length >= 4) return { player, cells };
  }
  return null;
}

// ---- CPU ----
function cpuMove() {
  if (gameOver) return;
  const col = bestMove();
  const row = lowestEmpty(col);
  placeLocal(row, col, 2);
}

function bestMove() {
  for (let c = 0; c < COLS; c++) {
    const r = lowestEmpty(c); if (r !== -1 && wouldWin(r, c, 2)) return c;
  }
  for (let c = 0; c < COLS; c++) {
    const r = lowestEmpty(c); if (r !== -1 && wouldWin(r, c, 1)) return c;
  }
  const sc = Array(COLS).fill(0);
  for (let c = 0; c < COLS; c++) {
    const r = lowestEmpty(c);
    if (r === -1) { sc[c] = -999; continue; }
    sc[c] += scorePos(r, c, 2) - scorePos(r, c, 1) * 0.9;
    sc[c] += (3 - Math.abs(c - 3)) * 0.5;
  }
  const max = Math.max(...sc);
  const cands = sc.map((s,i) => s === max ? i : -1).filter(i => i !== -1);
  return cands[Math.floor(Math.random() * cands.length)];
}

function wouldWin(r, c, p) {
  board[r][c] = p; const w = checkWin(board, r, c, p); board[r][c] = 0; return !!w;
}

function scorePos(r, c, p) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]]; let total = 0;
  for (const [dr, dc] of dirs) {
    let count = 1;
    for (let d = 1; d < 4; d++) {
      const nr = r+dr*d, nc = c+dc*d;
      if (nr<0||nr>=ROWS||nc<0||nc>=COLS||board[nr][nc]!==p) break; count++;
    }
    for (let d = 1; d < 4; d++) {
      const nr = r-dr*d, nc = c-dc*d;
      if (nr<0||nr>=ROWS||nc<0||nc>=COLS||board[nr][nc]!==p) break; count++;
    }
    total += count;
  }
  return total;
}

// ---- Render ----
function renderGame(winCells) {
  const boardEl = document.getElementById('board');
  const indRow  = document.getElementById('indicator-row');
  const status  = document.getElementById('status');
  const badge   = document.getElementById('player-badge');

  document.getElementById('score-p1').textContent = scores[1];
  document.getElementById('score-p2').textContent = scores[2];
  applyColors();

  const p1 = COLOR_DEFS[playerColors[1]];
  const p2 = COLOR_DEFS[playerColors[2]];
  const curColor = current === 1 ? p1 : p2;

  // Player badge (online only)
  if (mode === 'online') {
    const myColor = COLOR_DEFS[playerColors[myPlayer]];
    badge.textContent = `You are ${myColor.label}`;
    badge.style.color = myColor.primary;
  } else {
    badge.textContent = '';
  }

  // Status
  status.className = '';
  if (gameOver) {
    const tied = !winCells || winCells.length === 0;
    if (tied) {
      status.textContent = "It's a draw!";
    } else {
      const winner = board[winCells[0][0]][winCells[0][1]];
      status.textContent = `${(winner === 1 ? p1 : p2).label} wins!`;
    }
    status.className = 'win';
  } else {
    if (mode === 'online') {
      status.textContent = current === myPlayer ? 'Your turn' : "Opponent's turn";
    } else {
      status.textContent = curColor.label + "'s turn";
    }
    status.className = current === 1 ? 'p1-turn' : 'p2-turn';
  }

  const winSet = new Set((winCells || []).map(([r,c]) => `${r},${c}`));
  const canPlay = !gameOver && (mode !== 'online' || current === myPlayer) && !(mode === 'cpu' && current === 2);

  // Indicator row
  indRow.innerHTML = '';
  for (let c = 0; c < COLS; c++) {
    const cell = document.createElement('div');
    cell.className = 'indicator-cell';
    cell.dataset.col = c;
    const dot = document.createElement('div');
    dot.className = 'drop-dot';
    dot.style.background = `radial-gradient(circle at 35% 35%, ${curColor.light}, ${curColor.primary})`;
    cell.appendChild(dot);
    if (canPlay) {
      cell.addEventListener('click', () => dropPiece(c));
      cell.addEventListener('mouseenter', () => hoverCol(c, true));
      cell.addEventListener('mouseleave', () => hoverCol(c, false));
    }
    indRow.appendChild(cell);
  }

  // Board
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.col = c;

      if (board[r][c] === 1) cell.classList.add('p1');
      else if (board[r][c] === 2) cell.classList.add('p2');
      else if (!canPlay) cell.classList.add('not-my-turn');

      if (winSet.has(`${r},${c}`)) cell.classList.add('win-cell');

      if (canPlay && board[r][c] === 0) {
        cell.addEventListener('click', () => dropPiece(c));
        cell.addEventListener('mouseenter', () => hoverCol(c, true));
        cell.addEventListener('mouseleave', () => hoverCol(c, false));
      }

      boardEl.appendChild(cell);
    }
  }
}

function hoverCol(col, on) {
  if (gameOver) return;
  const primary = COLOR_DEFS[playerColors[current]].primary;
  document.querySelectorAll(`.cell[data-col="${col}"]`).forEach(c => {
    if (!c.classList.contains('p1') && !c.classList.contains('p2')) {
      c.style.background = on ? primary + '40' : '';
    }
  });
  const ic = document.querySelector(`.indicator-cell[data-col="${col}"]`);
  if (ic) ic.classList.toggle('hovered', on);
}

// ---- Init ----
if (!isFirebaseConfigured()) {
  document.getElementById('config-warning').style.display = 'block';
}
applyColors();
renderSwatches();
showScreen('screen-lobby');
</script>
</body>
