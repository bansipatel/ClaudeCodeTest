<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.winner {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease-in-out 2;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.1); }
    }

    #controls {
      margin-top: 1.5rem;
      display: flex;
      gap: 1rem;
    }

    button {
      background: #e94560;
      color: white;
      border: none;
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #c73652; }

    #mode-toggle {
      background: #0f3460;
    }
    #mode-toggle:hover { background: #1a4a80; }

    #score {
      margin-top: 1.5rem;
      display: flex;
      gap: 2rem;
      font-size: 1rem;
      color: #aaa;
    }

    .score-item span { font-size: 1.4rem; font-weight: bold; color: #eee; }
    .x-score span    { color: #e94560; }
    .o-score span    { color: #a8dadc; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status"></div>
  <div id="board"></div>
  <div id="controls">
    <button id="restart">Restart</button>
    <button id="mode-toggle">vs CPU</button>
  </div>
  <div id="score">
    <div class="score-item x-score">X wins: <span id="score-x">0</span></div>
    <div class="score-item">Draws: <span id="score-d">0</span></div>
    <div class="score-item o-score">O wins: <span id="score-o">0</span></div>
  </div>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    let board, current, gameOver;
    let vsCPU = false;
    const scores = { X: 0, O: 0, D: 0 };

    const boardEl  = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const modeBtn  = document.getElementById('mode-toggle');

    function init() {
      board   = Array(9).fill('');
      current = 'X';
      gameOver = false;
      render();
      statusEl.textContent = "Player X's turn";
    }

    function render() {
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
        cell.textContent = val;
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
      });
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      if (vsCPU && current === 'O') return; // CPU's turn
      place(i);
    }

    function place(i) {
      board[i] = current;
      render();

      const win = checkWin();
      if (win) {
        highlightWin(win);
        scores[current]++;
        updateScore();
        statusEl.textContent = vsCPU && current === 'O'
          ? 'CPU wins!'
          : `Player ${current} wins!`;
        gameOver = true;
        return;
      }

      if (board.every(v => v)) {
        statusEl.textContent = "It's a draw!";
        scores.D++;
        updateScore();
        gameOver = true;
        return;
      }

      current = current === 'X' ? 'O' : 'X';

      if (vsCPU && current === 'O') {
        statusEl.textContent = 'CPU is thinking...';
        setTimeout(cpuMove, 400);
      } else {
        statusEl.textContent = `Player ${current}'s turn`;
      }
    }

    function cpuMove() {
      if (gameOver) return;
      place(bestMove());
    }

    function bestMove() {
      // Win if possible
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'O';
          const w = checkWin();
          board[i] = '';
          if (w) return i;
        }
      }
      // Block opponent
      for (let i = 0; i < 9; i++) {
        if (!board[i]) {
          board[i] = 'X';
          const w = checkWin();
          board[i] = '';
          if (w) return i;
        }
      }
      // Take center
      if (!board[4]) return 4;
      // Take a corner
      const corners = [0, 2, 6, 8].filter(i => !board[i]);
      if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
      // Take any free cell
      const free = board.map((v, i) => v ? null : i).filter(i => i !== null);
      return free[Math.floor(Math.random() * free.length)];
    }

    function checkWin() {
      return WINS.find(([a, b, c]) =>
        board[a] && board[a] === board[b] && board[b] === board[c]
      ) || null;
    }

    function highlightWin(combo) {
      const cells = boardEl.querySelectorAll('.cell');
      combo.forEach(i => cells[i].classList.add('winner'));
    }

    function updateScore() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-d').textContent = scores.D;
    }

    document.getElementById('restart').addEventListener('click', init);

    modeBtn.addEventListener('click', () => {
      vsCPU = !vsCPU;
      modeBtn.textContent = vsCPU ? 'vs Human' : 'vs CPU';
      init();
    });

    init();
  </script>
</body>
</html>
